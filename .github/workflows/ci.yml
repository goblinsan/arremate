name: CI and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @arremate/database db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy-staging-pr:
    name: Deploy Staging (PR)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @arremate/database db:generate

      - name: Validate staging secrets
        env:
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
          DIRECT_URL_STAGING: ${{ secrets.DIRECT_URL_STAGING }}
        run: |
          if [ -z "$DATABASE_URL_STAGING" ]; then
            echo "DATABASE_URL_STAGING is not set"
            exit 1
          fi

          if [ -z "$DIRECT_URL_STAGING" ]; then
            echo "DIRECT_URL_STAGING is not set; falling back to DATABASE_URL_STAGING for Prisma schema sync"
          fi

      - name: Apply staging database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_STAGING != '' && secrets.DIRECT_URL_STAGING || secrets.DATABASE_URL_STAGING }}
        run: pnpm --filter @arremate/database db:push

      - name: Set staging API secret
        env:
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          cd apps/api
          printf '%s' "$DATABASE_URL_STAGING" | pnpm dlx wrangler secret put DATABASE_URL --env staging

      - name: Deploy staging API worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: pnpm --filter @arremate/api run deploy:staging

      - name: Validate web OAuth build vars
        env:
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
        run: |
          if [ -z "$VITE_COGNITO_DOMAIN" ]; then
            echo "VITE_COGNITO_DOMAIN repository variable is not set"
            echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi

      - name: Build web and admin
        env:
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
        run: |
          export VITE_API_URL=https://api.arrematelive.com
          export VITE_COGNITO_REGION=sa-east-1
          export VITE_COGNITO_USER_POOL_ID=sa-east-1_xnhLw2zr0
          export VITE_COGNITO_REDIRECT_URI=https://arrematelive.com/auth/callback
          export VITE_COGNITO_OAUTH_SCOPES="openid email profile"
          export VITE_COGNITO_SOCIAL_PROVIDERS="Google,SignInWithApple,Facebook,Instagram,GovBr"

          VITE_COGNITO_CLIENT_ID=20t0nesdp1safrcr5adf71hrqa pnpm --filter @arremate/web build
          VITE_COGNITO_CLIENT_ID=61cga7njav2qa97gcbirts1cgl pnpm --filter @arremate/admin build

      - name: Deploy web preview (PR)
        run: |
          pnpm dlx wrangler pages deploy apps/web/dist \
            --project-name arremate-web-prod \
            --branch pr-${{ github.event.pull_request.number }} \
            --commit-dirty=true

      - name: Deploy admin preview (PR)
        run: |
          pnpm dlx wrangler pages deploy apps/admin/dist \
            --project-name arremate-admin-prod \
            --branch pr-${{ github.event.pull_request.number }} \
            --commit-dirty=true

  deploy-production-main:
    name: Deploy Production (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @arremate/database db:generate

      - name: Validate production secrets
        env:
          DATABASE_URL_PRODUCTION: ${{ secrets.DATABASE_URL_PRODUCTION }}
          DIRECT_URL_PRODUCTION: ${{ secrets.DIRECT_URL_PRODUCTION }}
        run: |
          if [ -z "$DATABASE_URL_PRODUCTION" ]; then
            echo "DATABASE_URL_PRODUCTION is not set"
            exit 1
          fi

          if [ -z "$DIRECT_URL_PRODUCTION" ]; then
            echo "DIRECT_URL_PRODUCTION is not set; falling back to DATABASE_URL_PRODUCTION for Prisma schema sync"
          fi

      - name: Apply production database schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_PRODUCTION != '' && secrets.DIRECT_URL_PRODUCTION || secrets.DATABASE_URL_PRODUCTION }}
        run: pnpm --filter @arremate/database db:push

      - name: Set production API secret
        env:
          DATABASE_URL_PRODUCTION: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          cd apps/api
          printf '%s' "$DATABASE_URL_PRODUCTION" | pnpm dlx wrangler secret put DATABASE_URL --env production

      - name: Deploy production API worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: pnpm --filter @arremate/api run deploy

      - name: Validate web OAuth build vars
        env:
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
        run: |
          if [ -z "$VITE_COGNITO_DOMAIN" ]; then
            echo "VITE_COGNITO_DOMAIN repository variable is not set"
            echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi

      - name: Build web and admin
        env:
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
        run: |
          export VITE_API_URL=https://api.arrematelive.com
          export VITE_COGNITO_REGION=sa-east-1
          export VITE_COGNITO_USER_POOL_ID=sa-east-1_xnhLw2zr0
          export VITE_COGNITO_REDIRECT_URI=https://arrematelive.com/auth/callback
          export VITE_COGNITO_OAUTH_SCOPES="openid email profile"
          export VITE_COGNITO_SOCIAL_PROVIDERS="Google,SignInWithApple,Facebook,Instagram,GovBr"

          VITE_COGNITO_CLIENT_ID=20t0nesdp1safrcr5adf71hrqa pnpm --filter @arremate/web build
          VITE_COGNITO_CLIENT_ID=61cga7njav2qa97gcbirts1cgl pnpm --filter @arremate/admin build

      - name: Deploy web production
        run: |
          pnpm dlx wrangler pages deploy apps/web/dist \
            --project-name arremate-web-prod \
            --branch main \
            --commit-dirty=true

      - name: Deploy admin production
        run: |
          pnpm dlx wrangler pages deploy apps/admin/dist \
            --project-name arremate-admin-prod \
            --branch main \
            --commit-dirty=true
