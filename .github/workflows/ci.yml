name: CI and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @arremate/database db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy-staging-pr:
    name: Deploy Staging (PR)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @arremate/database db:generate

      - name: Set staging API secret
        run: |
          cd apps/api
          printf '%s' "${{ secrets.DATABASE_URL_STAGING }}" | pnpm dlx wrangler secret put DATABASE_URL --env staging

      - name: Deploy staging API worker
        run: pnpm --filter @arremate/api run deploy:staging

      - name: Build web and admin
        run: |
          pnpm --filter @arremate/web build
          pnpm --filter @arremate/admin build

      - name: Deploy web preview (PR)
        run: |
          pnpm dlx wrangler pages deploy apps/web/dist \
            --project-name arremate-web-prod \
            --branch pr-${{ github.event.pull_request.number }} \
            --commit-dirty=true

      - name: Deploy admin preview (PR)
        run: |
          pnpm dlx wrangler pages deploy apps/admin/dist \
            --project-name arremate-admin-prod \
            --branch pr-${{ github.event.pull_request.number }} \
            --commit-dirty=true

  deploy-production-main:
    name: Deploy Production (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @arremate/database db:generate

      - name: Set production API secret
        run: |
          cd apps/api
          printf '%s' "${{ secrets.DATABASE_URL_PRODUCTION }}" | pnpm dlx wrangler secret put DATABASE_URL --env production

      - name: Deploy production API worker
        run: pnpm --filter @arremate/api run deploy

      - name: Build web and admin
        run: |
          pnpm --filter @arremate/web build
          pnpm --filter @arremate/admin build

      - name: Deploy web production
        run: |
          pnpm dlx wrangler pages deploy apps/web/dist \
            --project-name arremate-web-prod \
            --branch main \
            --commit-dirty=true

      - name: Deploy admin production
        run: |
          pnpm dlx wrangler pages deploy apps/admin/dist \
            --project-name arremate-admin-prod \
            --branch main \
            --commit-dirty=true
