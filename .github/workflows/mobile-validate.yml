name: Mobile Validate

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/types/**'
      - 'packages/auth/**'
      - 'packages/shared-utils/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/types/**'
      - 'packages/auth/**'
      - 'packages/shared-utils/**'

permissions:
  contents: read

jobs:
  validate-mobile:
    name: Validate Mobile App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck mobile
        run: pnpm --filter @arremate/mobile typecheck

      - name: Test mobile
        run: pnpm --filter @arremate/mobile test
